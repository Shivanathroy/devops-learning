name: Docker

on:
  push:
    branches: [main]
    paths: ['docker-project/**']
  pull_request:
    paths: ['docker-project/**']

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build \
            -t myapp:${{ github.sha }} \
            docker-project/app/

  scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Build for scan
        run: docker build -t myapp:scan docker-project/app/
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:scan
          severity: HIGH,CRITICAL
          exit-code: '0'
