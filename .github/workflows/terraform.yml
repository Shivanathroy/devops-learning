name: Terraform CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually trigger it from the UI

permissions:
  id-token: write  # Critical for Azure OIDC authentication
  contents: read   # Allows checking out your code

jobs:
  terraform:
    name: Run Terraform Plan
    runs-on: ubuntu-latest
    
    # Force GitHub to run commands inside your subfolder where main.tf lives
    defaults:
      run:
        working-directory: ./terraform-project

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0 # Adjust to match your local version if needed

      - name: Terraform Init
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          ARM_USE_AZUREAD: true
